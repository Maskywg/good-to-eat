<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大稻埕與台北城百年美食地圖 - 蔣萬安市長帶路</title>
    <meta name="description" content="本平台收錄台北大稻埕與台北城周邊經典老店與在地美食，包含郭烏隆私宅下午茶、慈聖宮清燙魷魚與雞捲、大橋頭筒仔米糕與海陸湯、建中後門林家乾麵等。配合互動式地圖與特製路線，帶您展開老城舌尖探險。">
    <!-- Google Fonts: Outfit for English/numbers, Noto Sans TC for Traditional Chinese -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet.js for interactive mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-medium">

    <!-- Header Panel -->
    <header class="app-header">
        <div class="container header-container">
            <a href="#" class="brand-logo" id="header-logo">
                <i class="fa-solid fa-map-location-dot brand-icon"></i>
                <span class="brand-name">大稻埕與台北城</span>
                <span class="brand-tag">市長帶路美食地圖</span>
            </a>
            
            <!-- Accessbility Toolbar -->
            <div class="accessibility-toolbar">
                <!-- Font Resize -->
                <div class="acc-control text-sizer">
                    <span class="acc-label"><i class="fa-solid fa-text-height"></i> 字型</span>
                    <button class="size-btn btn-sm" id="btn-font-decrease" aria-label="縮小字體">A-</button>
                    <button class="size-btn active" id="btn-font-normal" aria-label="一般字體">中</button>
                    <button class="size-btn btn-lg" id="btn-font-increase" aria-label="放大字體">A+</button>
                </div>
                <!-- Theme Toggle -->
                <button class="theme-toggle-btn" id="btn-toggle-theme" title="切換深淺色主題" aria-label="切換深淺模式">
                    <i class="fa-solid fa-moon" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="app-main">
        <!-- Sidebar: Filter & List -->
        <aside class="sidebar" id="sidebar-panel">
            <div class="sidebar-header">
                <h1>市長帶路百年老店</h1>
                <p class="subtitle">精選大稻埕與台北城周邊的歷史與在地小吃</p>
            </div>
            
            <!-- Search & Filters -->
            <div class="search-filter-section">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" placeholder="搜尋店名、招牌菜色或關鍵字...">
                </div>
                
                <div class="category-filters">
                    <button class="filter-btn active" data-category="all" id="filter-all">全部</button>
                    <button class="filter-btn" data-category="staple" id="filter-staple">經典主食</button>
                    <button class="filter-btn" data-category="snack" id="filter-snack">廟口小吃</button>
                    <button class="filter-btn" data-category="hidden" id="filter-hidden">鮮美湯品</button>
                    <button class="filter-btn" data-category="dessert" id="filter-dessert">老宅茶點</button>
                </div>
            </div>

            <!-- Curated Food Trails -->
            <div class="gourmet-trails">
                <h3><i class="fa-solid fa-route icon-margin"></i> 推薦美食路線</h3>
                <div class="trail-buttons">
                    <button class="trail-btn" data-trail="trail-classic" id="btn-trail-classic">
                        <i class="fa-solid fa-award"></i> 廟口老街線
                    </button>
                    <button class="trail-btn" data-trail="trail-takeaway" id="btn-trail-takeaway">
                        <i class="fa-solid fa-bowl-rice"></i> 大橋頭飽食線
                    </button>
                    <button class="trail-btn" data-trail="trail-hidden" id="btn-trail-hidden">
                        <i class="fa-solid fa-map"></i> 城南懷舊線
                    </button>
                </div>
                <div class="trail-info-box" id="trail-info-card" style="display: none;">
                    <div class="trail-info-header">
                        <span class="trail-name" id="trail-name-display">廟口老街線</span>
                        <button class="btn-close-trail" id="btn-clear-trail" title="清除路線"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <p class="trail-desc" id="trail-desc-display">悠遊大稻埕核心風情，品味老宅茶點與廟口經典小吃。</p>
                    <div class="trail-steps" id="trail-steps-display">
                        <!-- Dynamic Steps -->
                    </div>
                </div>
            </div>

            <!-- Mayor's Trivia Box -->
            <div class="mayor-trivia-box">
                <div class="trivia-header">
                    <i class="fa-solid fa-lightbulb trivia-icon"></i>
                    <span class="trivia-title">市長美食小知識</span>
                </div>
                <p class="trivia-content">
                    深受國際觀光客喜愛的夜市美食<strong>胡椒餅</strong>，其實最早的名字是<strong>「福州餅」</strong>喔！
                </p>
            </div>

            <!-- List Count and Reset -->
            <div class="list-summary-bar">
                <span id="shop-count">顯示 7 家店</span>
                <button class="btn-text-link" id="btn-reset-filters" style="display: none;">重設篩選</button>
            </div>

            <!-- Cards Container -->
            <div class="cards-container" id="food-cards-list" role="list">
                <!-- Rendered dynamically via JS -->
            </div>
        </aside>

        <!-- Map Pane -->
        <section class="map-pane">
            <!-- Mobile Toggle Bar: Switch between List and Map view -->
            <div class="mobile-toggle-nav">
                <button class="mobile-nav-btn active" id="btn-show-list">
                    <i class="fa-solid fa-list-ul"></i> 列表清單
                </button>
                <button class="mobile-nav-btn" id="btn-show-map">
                    <i class="fa-solid fa-map-location-dot"></i> 互動地圖
                </button>
            </div>
            
            <!-- Map Container -->
            <div id="map" aria-label="大稻埕與台北城互動美食地圖"></div>
        </section>
    </main>

    <!-- JS Logic Entrance -->
    <script src="app.js"></script>
</body>
</html>
